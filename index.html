<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E0A1F">
<title>Sistema Inteligente de Gestión Contractual · Parche Zipa</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
<style>
/* ====================== TOKENS ====================== */
:root{
  --purple:#6C3BFF; --purple-2:#8B5CFF; --lilac:#A78BFA;
  --yellow:#FFC700; --green:#2BFFAC; --pink:#FF6BD6;
  --bg:#0E0A1F; --bg-2:#150E2E; --bg-3:#1C1340;
  --ink:#F4F1FF; --ink-dim:#B9B0E0; --ink-soft:#8B82B5;
  --glass:rgba(255,255,255,.06); --glass-2:rgba(255,255,255,.09);
  --stroke:rgba(255,255,255,.12); --stroke-2:rgba(255,255,255,.18);
  --ok:#2BFFAC; --warn:#FFC700; --bad:#FF5C7A;
  --grad-main:linear-gradient(135deg,#6C3BFF 0%,#8B5CFF 45%,#A78BFA 100%);
  --grad-cta:linear-gradient(120deg,#6C3BFF 0%,#FFC700 55%,#2BFFAC 100%);
  --grad-mesh:radial-gradient(900px 600px at 12% -8%,rgba(108,59,255,.55),transparent 60%),radial-gradient(700px 500px at 105% 10%,rgba(43,255,172,.18),transparent 55%),radial-gradient(800px 700px at 80% 110%,rgba(255,199,0,.14),transparent 55%);
  --r:18px; --r-lg:26px; --shadow:0 24px 60px -24px rgba(0,0,0,.7);
  --display:'Space Grotesk',sans-serif; --body:'Plus Jakarta Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--body); color:var(--ink); background:var(--bg);
  background-image:var(--grad-mesh); background-attachment:fixed;
  -webkit-font-smoothing:antialiased; line-height:1.45; overflow-x:hidden;
}
.material-symbols-rounded{font-variation-settings:'FILL'0,'wght'400,'opsz'24;vertical-align:middle;font-size:20px;line-height:1}
h1,h2,h3,h4{font-family:var(--display);font-weight:600;letter-spacing:-.01em;line-height:1.1}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--purple);color:#fff}
:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:8px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ====================== SCROLLBAR ====================== */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(167,139,250,.35);border-radius:20px}
::-webkit-scrollbar-track{background:transparent}

/* ====================== LOGIN ====================== */
.auth{min-height:100dvh;display:grid;place-items:center;padding:24px}
.auth-card{
  width:min(420px,100%); background:var(--glass); border:1px solid var(--stroke);
  border-radius:var(--r-lg); padding:36px 30px; backdrop-filter:blur(22px);
  box-shadow:var(--shadow); position:relative; overflow:hidden;
}
.auth-card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 30%);pointer-events:none}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.brand .logo{width:54px;height:54px;border-radius:16px;flex:0 0 auto}
.brand b{font-family:var(--display);font-size:18px;font-weight:700;display:block;letter-spacing:-.02em}
.brand span{font-size:11.5px;color:var(--ink-soft);letter-spacing:.14em;text-transform:uppercase}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--ink-dim);margin-bottom:7px;font-weight:600}
.input{
  width:100%;background:rgba(0,0,0,.25);border:1px solid var(--stroke);
  border-radius:14px;padding:13px 14px;font-size:14.5px;transition:.18s;
}
.input:focus{border-color:var(--purple-2);background:rgba(108,59,255,.12)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  border:none;border-radius:14px;padding:13px 18px;font-weight:700;font-size:14.5px;
  transition:transform .12s, box-shadow .2s, filter .2s; letter-spacing:.01em;
}
.btn:active{transform:translateY(1px) scale(.99)}
.btn-cta{background:var(--grad-cta);color:#1a0e3d;width:100%;box-shadow:0 12px 30px -12px rgba(108,59,255,.8)}
.btn-cta:hover{filter:brightness(1.06)}
.btn-lila{background:var(--lilac);color:#1a0e3d;width:100%;box-shadow:0 12px 30px -14px rgba(167,139,250,.7)}
.btn-lila:hover{filter:brightness(1.05)}
.btn-ghost{background:var(--glass);border:1px solid var(--stroke);color:var(--ink)}
.btn-ghost:hover{background:var(--glass-2)}
.btn-purple{background:var(--grad-main);color:#fff;box-shadow:0 12px 30px -14px rgba(108,59,255,.9)}
.btn-sm{padding:8px 13px;font-size:13px;border-radius:11px}
.btn-block{width:100%}
.role-pills{display:flex;gap:8px;margin:18px 0 6px;flex-wrap:wrap}
.role-pill{flex:1;min-width:90px;text-align:center;padding:9px;border-radius:12px;border:1px solid var(--stroke);background:var(--glass);font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-dim);transition:.16s}
.role-pill.on{border-color:var(--green);color:var(--ink);background:rgba(43,255,172,.1)}
.hint{font-size:11.5px;color:var(--ink-soft);margin-top:14px;line-height:1.6;border-top:1px dashed var(--stroke);padding-top:12px}
.hint code{background:rgba(255,255,255,.08);padding:1px 6px;border-radius:6px;font-size:11px;color:var(--green)}

/* ====================== APP SHELL ====================== */
.app{display:none;min-height:100dvh;grid-template-columns:248px 1fr}
.app.show{display:grid}
.backdrop{display:none}
.side{
  background:rgba(14,10,31,.72);border-right:1px solid var(--stroke);
  backdrop-filter:blur(18px);padding:20px 14px;display:flex;flex-direction:column;
  position:sticky;top:0;height:100dvh;z-index:40;
}
.side .brand{margin-bottom:18px;padding:0 6px}
.nav{display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:13px;
  color:var(--ink-dim);font-weight:600;font-size:14px;cursor:pointer;transition:.15s;border:1px solid transparent;
}
.nav-item:hover{background:var(--glass);color:var(--ink)}
.nav-item.on{background:var(--grad-main);color:#fff;box-shadow:0 10px 24px -14px var(--purple)}
.nav-item .material-symbols-rounded{font-size:21px}
.nav-sep{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);padding:14px 14px 6px;font-weight:700}
.side-foot{border-top:1px solid var(--stroke);padding-top:12px;margin-top:8px}
.userchip{display:flex;align-items:center;gap:10px;padding:6px 8px}
.userchip .av{width:38px;height:38px;border-radius:12px;background:var(--grad-main);display:grid;place-items:center;font-weight:800;font-family:var(--display);flex:0 0 auto}
.userchip small{display:block;color:var(--ink-soft);font-size:11px}
.userchip b{font-size:13.5px;font-family:var(--display)}

.main{min-width:0;padding:24px 28px 60px;max-width:1280px;width:100%;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.topbar h1{font-size:25px}
.topbar .sub{color:var(--ink-soft);font-size:13px;margin-top:3px}
.menu-btn{display:none;background:var(--glass);border:1px solid var(--stroke);border-radius:12px;padding:9px 11px;cursor:pointer}

/* ====================== CARDS / GLASS ====================== */
.card{background:var(--glass);border:1px solid var(--stroke);border-radius:var(--r);backdrop-filter:blur(16px);padding:20px}
.card.hl{background:linear-gradient(180deg,rgba(108,59,255,.16),rgba(255,255,255,.04));border-color:rgba(167,139,250,.3)}
.grid{display:grid;gap:16px}
.g-4{grid-template-columns:repeat(4,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-2{grid-template-columns:repeat(2,1fr)}
.stat{position:relative;overflow:hidden}
.stat .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;margin-bottom:12px;background:rgba(255,255,255,.08)}
.stat .num{font-family:var(--display);font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1}
.stat .lbl{color:var(--ink-soft);font-size:12.5px;margin-top:6px;font-weight:600}
.stat .delta{font-size:11.5px;font-weight:700;margin-top:8px;display:inline-flex;gap:4px;align-items:center}
.delta.up{color:var(--green)} .delta.down{color:var(--bad)}

.section-title{display:flex;align-items:center;justify-content:space-between;margin:26px 0 14px;gap:12px;flex-wrap:wrap}
.section-title h2{font-size:18px}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--lilac);font-weight:700;margin-bottom:3px}

/* ====================== CONTRACTOR CARDS ====================== */
.contractor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.ct-card{background:var(--glass);border:1px solid var(--stroke);border-radius:var(--r);padding:18px;backdrop-filter:blur(16px);transition:.18s;cursor:pointer;position:relative;overflow:hidden}
.ct-card:hover{border-color:var(--purple-2);transform:translateY(-3px);box-shadow:var(--shadow)}
.ct-head{display:flex;gap:13px;align-items:center;margin-bottom:14px}
.ct-photo{width:52px;height:52px;border-radius:15px;background:var(--grad-main);display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:19px;flex:0 0 auto}
.ct-head b{font-size:15px;font-family:var(--display);display:block}
.ct-head small{color:var(--ink-soft);font-size:12px}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px}
.badge.ok{background:rgba(43,255,172,.14);color:var(--green)}
.badge.warn{background:rgba(255,199,0,.14);color:var(--yellow)}
.badge.bad{background:rgba(255,92,122,.14);color:var(--bad)}
.badge.muted{background:var(--glass-2);color:var(--ink-dim)}
.progress{height:8px;border-radius:20px;background:rgba(255,255,255,.08);overflow:hidden;margin:12px 0 6px}
.progress i{display:block;height:100%;border-radius:20px;background:var(--grad-cta)}
.ct-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:10px;flex-wrap:wrap;gap:6px}

/* ====================== TABLES ====================== */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--stroke)}
table{width:100%;border-collapse:collapse;min-width:560px}
th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;padding:13px 14px;background:rgba(0,0,0,.22);position:sticky;top:0}
td{padding:13px 14px;border-top:1px solid var(--stroke);font-size:13.5px;vertical-align:top}
tr:hover td{background:rgba(255,255,255,.03)}

/* ====================== FORMS ====================== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.f label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:6px;font-weight:600}
.f .input,.f textarea,.f select{width:100%}
textarea.input{resize:vertical;min-height:96px;line-height:1.55}
.f.full{grid-column:1/-1}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:20px;background:var(--glass);border:1px solid var(--stroke);font-size:12.5px;font-weight:600}

/* ====================== AI / ASSISTANT ====================== */
.ai-box{background:linear-gradient(180deg,rgba(108,59,255,.16),rgba(43,255,172,.05));border:1px solid rgba(167,139,250,.35);border-radius:var(--r);padding:16px;position:relative}
.ai-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin-bottom:9px}
.ai-tag .material-symbols-rounded{font-size:16px}
.alert-list{display:flex;flex-direction:column;gap:9px}
.alert{display:flex;gap:11px;align-items:flex-start;padding:11px 13px;border-radius:13px;background:var(--glass);border:1px solid var(--stroke);font-size:13px}
.alert .dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex:0 0 auto}
.dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)}
.sem{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:7px;vertical-align:middle}
.sem.g{background:var(--ok);box-shadow:0 0 9px var(--ok)} .sem.y{background:var(--warn);box-shadow:0 0 9px var(--warn)} .sem.r{background:var(--bad);box-shadow:0 0 9px var(--bad)}

/* ====================== OBLIGATIONS ====================== */
.obl{display:flex;gap:12px;align-items:flex-start;padding:14px;border-radius:14px;background:var(--glass);border:1px solid var(--stroke);margin-bottom:10px;cursor:grab;transition:.15s}
.obl:hover{border-color:var(--stroke-2)}
.obl.drag{opacity:.5;border-style:dashed}
.obl .handle{color:var(--ink-soft);cursor:grab;padding-top:2px}
.obl .body{flex:1;min-width:0}
.obl .body b{font-size:13.5px;font-weight:600;display:block;margin-bottom:4px}
.obl .body p{font-size:12.5px;color:var(--ink-dim);line-height:1.5}
.obl .count{font-size:11px;color:var(--ink-soft);margin-top:6px}

/* ====================== MODAL ====================== */
.modal-bg{position:fixed;inset:0;background:rgba(8,5,20,.7);backdrop-filter:blur(6px);display:none;place-items:center;z-index:90;padding:18px}
.modal-bg.show{display:grid}
.modal{width:min(720px,100%);max-height:90dvh;overflow-y:auto;background:var(--bg-2);border:1px solid var(--stroke-2);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow)}
.modal h3{font-size:19px;margin-bottom:4px}
.modal .x{float:right;cursor:pointer;color:var(--ink-soft);background:var(--glass);border:1px solid var(--stroke);border-radius:10px;width:34px;height:34px;display:grid;place-items:center}

/* ====================== PHOTOS ====================== */
.photos{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.photo-slot{width:120px;height:120px;border-radius:14px;border:2px dashed var(--stroke-2);display:grid;place-items:center;cursor:pointer;color:var(--ink-soft);overflow:hidden;background:var(--glass);position:relative;transition:.15s}
.photo-slot:hover{border-color:var(--purple-2)}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-slot .rm{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.6);border-radius:8px;width:24px;height:24px;display:grid;place-items:center;color:#fff;font-size:15px}

/* ====================== CALENDAR ====================== */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{font-size:11px;text-transform:uppercase;color:var(--ink-soft);text-align:center;font-weight:700;padding:4px}
.cal .day{aspect-ratio:1;border-radius:11px;background:var(--glass);border:1px solid var(--stroke);padding:7px;font-size:12px;position:relative}
.cal .day.out{opacity:.32}
.cal .day.has{border-color:var(--green);background:rgba(43,255,172,.08)}
.cal .day .n{font-weight:700;font-family:var(--display)}
.cal .day .d{position:absolute;bottom:6px;left:7px;width:7px;height:7px;border-radius:50%;background:var(--green)}
.cal .day.cut{border-color:var(--yellow)}

/* ====================== MISC ====================== */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--bg-3);border:1px solid var(--stroke-2);padding:13px 20px;border-radius:14px;font-size:13.5px;font-weight:600;z-index:120;box-shadow:var(--shadow);transition:transform .3s;display:flex;gap:9px;align-items:center;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:48px 20px;color:var(--ink-soft)}
.empty .material-symbols-rounded{font-size:46px;opacity:.5;display:block;margin:0 auto 10px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spread{justify-content:space-between}
.mt{margin-top:16px}.mt-s{margin-top:9px}.mb{margin-bottom:16px}
.muted{color:var(--ink-soft)} .dim{color:var(--ink-dim)}
.tiny{font-size:12px}
.tag-mini{font-size:10.5px;padding:2px 7px;border-radius:6px;background:var(--glass-2);color:var(--lilac);font-weight:700}
.search{position:relative}
.search .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none}
.search .input{padding-left:40px}
.hl-mark{background:rgba(255,199,0,.32);border-radius:4px;padding:0 2px;color:var(--yellow)}
.bars{display:flex;align-items:flex-end;gap:8px;height:130px;padding-top:8px}
.bars .b{flex:1;background:var(--grad-main);border-radius:8px 8px 0 0;min-height:5px;position:relative;transition:.3s}
.bars .b span{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10.5px;color:var(--ink-soft)}
.bars .b b{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:10.5px;font-family:var(--display)}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink-dim);margin-top:26px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px}

/* ====================== RESPONSIVE ====================== */
@media (max-width:1080px){.g-4{grid-template-columns:repeat(2,1fr)}.g-3{grid-template-columns:repeat(2,1fr)}}
@media (max-width:860px){
  .app.show{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;width:264px;transform:translateX(-104%);transition:transform .25s;box-shadow:var(--shadow)}
  .side.open{transform:translateX(0)}
  .menu-btn{display:inline-flex}
  .main{padding:18px 16px 70px}
  .form-grid{grid-template-columns:1fr}
  .g-2{grid-template-columns:1fr}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35;display:none}
  .backdrop.show{display:block}
}
@media (max-width:520px){.g-4,.g-3{grid-template-columns:1fr}.topbar h1{font-size:21px}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="auth" id="auth">
  <div class="auth-card">
    <div class="brand">
      <img src="icon.svg" class="logo" alt="Parche Zipa">
      <div>
        <b>Gestión Contractual</b>
        <span>Parche Zipa · Juventud</span>
      </div>
    </div>
    <div class="role-pills" id="rolePills">
      <div class="role-pill on" data-role="supervisor">Supervisor</div>
      <div class="role-pill" data-role="contratista">Contratista</div>
    </div>
    <div class="field">
      <label>Usuario</label>
      <input class="input" id="lUser" placeholder="supervisor" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input class="input" id="lPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="btnEntrar" class="btn btn-lila mt-s" onclick="doLogin()"><span class="material-symbols-rounded">login</span> Entrar</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="app" id="app">
  <div class="backdrop" id="backdrop" onclick="toggleSide(false)"></div>
  <aside class="side" id="side">
    <div class="brand">
      <img src="icon.svg" class="logo" style="width:40px;height:40px;border-radius:12px" alt="">
      <div><b style="font-size:15px">Parche Zipa</b><span style="font-size:10px">Gestión Contractual</span></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <div class="userchip">
        <div class="av" id="uAv">S</div>
        <div style="flex:1;min-width:0"><b id="uName">Supervisor</b><small id="uRole">Supervisión</small></div>
      </div>
      <button class="btn btn-ghost btn-sm btn-block mt-s" onclick="logout()"><span class="material-symbols-rounded">logout</span> Salir</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;gap:12px;align-items:center">
        <button class="menu-btn" onclick="toggleSide(true)"><span class="material-symbols-rounded">menu</span></button>
        <div>
          <h1 id="pageTitle">Inicio</h1>
          <div class="sub" id="pageSub">Bienvenido al sistema</div>
        </div>
      </div>
      <div class="row" id="topActions"></div>
    </div>
    <div id="view"></div>
  </main>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* =================================================================
   SISTEMA INTELIGENTE DE GESTIÓN CONTRACTUAL · PARCHE ZIPA
   Frontend PWA — funciona solo (modo demo) o con backend (modo vivo)
   ================================================================= */

/* ---------- CONFIG ----------
   Deja API_URL vacío para MODO DEMO (datos de prueba, IA heurística local).

/* En MODO VIVO estas funciones llaman al backend (ver aiLive). Aquí, redacción local. */
function aiMejorarTexto(raw, oblTexto=""){
  if(!raw || !raw.trim()) return "";
  const t = raw.toLowerCase();
  const lugar = /colegio|institución|instituci|escuela|ie /.test(t) ? "la institución educativa"
              : /parque|cancha|barrio|comunidad/.test(t) ? "el espacio comunitario"
              : /casa de la juventud|oficina|despacho/.test(t) ? "las instalaciones del Programa de Juventud"
              : "el territorio";
  const accion = /taller|capacit|formaci/.test(t) ? "una jornada de formación"
               : /reunión|reunion|articul|coordin/.test(t) ? "una jornada de articulación y coordinación"
               : /liderazgo/.test(t) ? "una jornada de fortalecimiento del liderazgo juvenil"
               : /reporte|sistematiz|organic|organiz/.test(t) ? "actividades de sistematización y consolidación de la información"
               : "una jornada de acompañamiento";
  const enfoque = /participaci/.test(t) ? "la participación juvenil"
               : /liderazgo/.test(t) ? "el fortalecimiento del liderazgo"
               : /convivencia/.test(t) ? "la convivencia y la sana interacción"
               : /reporte|sistematiz/.test(t) ? "la consolidación documental de la gestión"
               : "la vinculación de los jóvenes a la oferta institucional";
  let s = `Se desarrolló ${accion} en ${lugar}, en el marco del Programa de Juventud de la Secretaría de Familia y Desarrollo Social, promoviendo espacios orientados a ${enfoque}`;
  if(/jóvenes|jovenes|muchachos|estudiantes|chicos/.test(t)) s += ", con la participación activa de jóvenes del municipio";
  s += ". La actividad se ejecutó conforme a la obligación contractual y a los lineamientos institucionales del Programa.";
  return s;
}
function aiResultados(raw){
  const t=(raw||"").toLowerCase();
  if(/taller|formaci|capacit/.test(t)) return "Se logró la realización efectiva de la jornada de formación, con la vinculación de los jóvenes participantes y el desarrollo de los contenidos previstos.";
  if(/reunión|articul|coordin/.test(t)) return "Se logró la articulación de los actores convocados y la definición de acciones conjuntas para el desarrollo de las actividades del Programa.";
  if(/reporte|sistematiz|organic/.test(t)) return "Se consolidó la información correspondiente al período, dejando los soportes debidamente organizados y disponibles para la supervisión.";
  return "Se cumplió con la actividad programada, generando espacios de participación y acercamiento de los jóvenes a la oferta institucional.";
}
function aiImpacto(raw){
  const t=(raw||"").toLowerCase();
  if(/lider/.test(t)) return "Se contribuyó al fortalecimiento del liderazgo y la corresponsabilidad de los jóvenes frente a los procesos comunitarios del municipio.";
  if(/participaci/.test(t)) return "Se aportó al fortalecimiento de la participación juvenil y al posicionamiento del Programa de Juventud en el territorio.";
  return "Se generó un impacto positivo en la población juvenil, aportando a los objetivos del Programa de Juventud de Zipaquirá.";
}

/* Análisis del expediente: alertas + semáforo por obligación */
function aiAnalizar(contractor, periodo=null){
  const acts = DB.activities.filter(a=>a.contractorId===contractor.id && (!periodo || enPeriodo(a.fecha,periodo)));
  const oblsActivas = contractor.obligaciones.filter(o=>o.activa);
  const porObl = oblsActivas.map(o=>{
    const list=acts.filter(a=>a.oblId===o.id);
    const fotos=list.reduce((s,a)=>s+a.fotos.length,0);
    let sem = list.length===0 ? "r" : (list.length<2 || fotos===0) ? "y" : "g";
    return {obl:o, acts:list, fotos, sem};
  });
  const alertas=[];
  porObl.forEach(p=>{
    if(p.sem==="r") alertas.push({nivel:"bad",txt:`La obligación «${shorten(p.obl.texto)}» no tiene actividades registradas.`});
    else if(p.fotos===0) alertas.push({nivel:"warn",txt:`«${shorten(p.obl.texto)}» tiene actividades pero faltan fotografías de soporte.`});
    else if(p.acts.length<2) alertas.push({nivel:"warn",txt:`«${shorten(p.obl.texto)}» tiene poca evidencia; se recomienda registrar más actividades.`});
  });
  // descripciones muy cortas
  acts.forEach(a=>{ if((a.descRaw||"").trim().length<25) alertas.push({nivel:"warn",txt:`Hay una actividad del ${fmtDate(a.fecha)} con descripción muy corta.`}); });
  // actividades repetidas
  const vistos={};
  acts.forEach(a=>{ const k=(a.descRaw||"").toLowerCase().trim(); if(k){ if(vistos[k]) alertas.push({nivel:"warn",txt:`Posible actividad repetida ("${shorten(a.descRaw,40)}").`}); vistos[k]=1; } });
  const cumplidas=porObl.filter(p=>p.sem==="g").length;
  const avance = oblsActivas.length? Math.round((cumplidas/oblsActivas.length)*100):0;
  if(alertas.length===0) alertas.push({nivel:"ok",txt:"Excelente: todas las obligaciones cuentan con soporte adecuado para el período."});
  return {porObl, alertas, avance, totalActs:acts.length, totalFotos:porObl.reduce((s,p)=>s+p.fotos,0)};
}
const shorten=(s,n=48)=> s.length>n ? s.slice(0,n)+"…" : s;

}

async function apiCall(action, payload={}){
  if(!CONFIG.API_URL){ throw new Error("demo"); }
  const res = await fetch(CONFIG.API_URL, {
    method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify({action, ...payload})
  });
  return res.json();
}
const LIVE = ()=> !!CONFIG.API_URL;

/* Cargar los datos compartidos desde el backend (Google Sheets) en MODO VIVO.
   Esto hace que los cambios del supervisor (p.ej. documentos) lleguen a todos los dispositivos. */
async function loadFromBackend(){
  if(!LIVE()) return false;
  try{
    const r = await apiCall("listar");
    if(!r || !Array.isArray(r.contractors) || r.contractors.length===0) return false;
    const obls = Array.isArray(r.obligaciones) ? r.obligaciones : [];
    const acts = Array.isArray(r.actividades)  ? r.actividades  : [];
    const d10 = v => { if(v==null) return ""; const s=String(v); return (s.length>=10 && s[4]==="-") ? s.slice(0,10) : s; };
    const truthy = v => v===true||v===1||v==="true"||v==="TRUE"||v==="VERDADERO"||v==="Sí"||v==="si"||v==="1";
    DB.contractors = r.contractors.filter(row=>row && (row.id!==undefined && row.id!=="")).map(row=>{
      const lista = obls.filter(o=>String(o.contractorId)===String(row.id))
        .sort((a,b)=>(+a.orden||0)-(+b.orden||0))
        .map((o,i)=>({ id:String(o.id||uid()), orden:+o.orden||(i+1), texto:o.texto||"",
                       activa:(o.activa===""||o.activa==null) ? true : truthy(o.activa) }));
      const vS=+row.vSalud||0, vP=+row.vPension||0, vA=+row.vArl||0;
      return {
        id:String(row.id), doc:String(row.doc==null?"":row.doc).trim(), nombre:row.nombre||"", contrato:row.contrato||"",
        dependencia:row.dependencia||"", supervisor:row.supervisor||"", objeto:row.objeto||"",
        plazoIni:row.plazoIni||"", plazoProrroga:row.plazoProrroga||"", plazoTotal:row.plazoTotal||"",
        valorIni:+row.valorIni||0, valorAdic:+row.valorAdic||0, fechaIni:d10(row.fechaIni), fechaFin:d10(row.fechaFin),
        corte:{ ini:+row.corteIni||21, fin:+row.corteFin||20 }, fechaInforme:d10(row.fechaInforme),
        eps:row.eps||"", pension:row.pension||"", arl:row.arl||"",
        vSalud:vS, vPension:vP, vArl:vA, vAportes:vS+vP+vA,
        estado:row.estado||"activo", obs:row.obs||"",
        obligaciones: lista.length ? lista : mkObl(), novedades:[], email:row.email||""
      };
    });
    DB.activities = acts.filter(a=>a && a.id!==undefined && a.id!=="").map(a=>({
      id:String(a.id), contractorId:String(a.contractorId), oblId:String(a.oblId||""),
      fecha:d10(a.fecha), lugar:a.lugar||"", descRaw:a.descRaw||"", descAI:a.descAI||"",
      resultados:a.resultados||"", impacto:a.impacto||"",
      fotos:[a.foto1,a.foto2].filter(x=>x && String(x).trim())
    }));
    return true;
  }catch(e){ console.warn("No se pudo cargar del backend; se usan datos locales.", e); return false; }
}

/* ====================== CÁLCULO DE PERÍODOS DE CORTE ====================== */
/* Genera el período de corte vigente o por índice. corte={ini,fin} */
function periodoCorte(corte, refDate=new Date()){
  const d=refDate.getDate(); let y=refDate.getFullYear(), m=refDate.getMonth();
  // Si hoy es < día de inicio, el período empezó el mes pasado
  let startM=m, startY=y;
  if(d < corte.ini){ startM=m-1; if(startM<0){startM=11;startY--;} }
  const start=new Date(startY,startM,corte.ini);
  let endM=startM+1, endY=startY; if(endM>11){endM=0;endY++;}
  const end=new Date(endY,endM,corte.fin);
  return {start:iso(start), end:iso(end), label:`${corte.ini} ${MESES[startM].slice(0,3)} – ${corte.fin} ${MESES[endM].slice(0,3)}`};
}
function periodosDisponibles(corte, n=6){
  const out=[]; const now=new Date();
  for(let i=0;i<n;i++){ const ref=new Date(now.getFullYear(),now.getMonth()-i,corte.ini+1); out.push(periodoCorte(corte,ref)); }
  return out;
}
const iso = d => d.toISOString().slice(0,10);
function enPeriodo(fecha, periodo){ return fecha>=periodo.start && fecha<=periodo.end; }

  const nav=$("#nav"); nav.innerHTML="";
  NAV[SESSION.role].forEach(item=>{
    if(item.sep){ const s=document.createElement("div"); s.className="nav-sep"; s.textContent=item.sep; nav.appendChild(s); return; }
    const el=document.createElement("div"); el.className="nav-item"; el.dataset.page=item.id;
    el.innerHTML=`<span class="material-symbols-rounded">${item.ic}</span> ${item.t}`;
    el.onclick=()=>{ go(item.id); toggleSide(false); };

function addPhoto(input,i){
  if(REG_PHOTOS.length>=2 && !REG_PHOTOS[i]){ input.value=""; return toast("Máximo 2 fotografías","info"); }
  const f=input.files[0]; if(!f) return;
  if(!f.type.startsWith("image/")){ input.value=""; return toast("Solo se permiten imágenes","block"); }
  const rd=new FileReader();
  rd.onload=()=>{ REG_PHOTOS[i]=rd.result;
    const slot=$("#slot"+i);
    slot.innerHTML=`<img src="${rd.result}"><span class="rm material-symbols-rounded" onclick="rmPhoto(event,${i})">close</span>`;
  };
  rd.readAsDataURL(f);
}
function rmPhoto(e,i){ e.preventDefault();e.stopPropagation(); REG_PHOTOS[i]=null;
  $("#slot"+i).innerHTML=`<span class="material-symbols-rounded">add_a_photo</span><input type="file" accept="image/*" hidden onchange="addPhoto(this,${i})">`; }
function dictar(id){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return toast("Tu navegador no soporta dictado","info");
  const r=new SR(); r.lang="es-CO"; r.interimResults=false;
  toast("Escuchando… habla ahora","mic"); r.start();
  r.onresult=e=>{ const txt=e.results[0][0].transcript; const el=$("#"+id); el.value=(el.value?el.value+" ":"")+txt; };
  r.onerror=()=>toast("No se pudo escuchar","error");
}

async function generarWord(pi){
  const c=me(); const per=periodosDisponibles(c.corte)[pi||0];
  const planilla=$("#iPlanilla")?.value||"____________";
  const entrega=$("#iEntrega")?.value||c.fechaInforme;
  if(LIVE()){
    try{ toast("Generando .docx en el servidor…","cloud"); const r=await apiCall("generar_informe",{contractorId:c.id,periodo:per,planilla,entrega});
      if(r.url){ window.open(r.url,"_blank"); return toast("Informe generado en Drive ✓"); } }catch(e){ toast("Backend no disponible, generando local","info"); }
  }
  const html=buildInformeHTML(c,per,planilla,entrega);
  const blob=new Blob(['\ufeff'+html],{type:"application/msword"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`Informe_${c.contrato}_${per.start}.doc`; a.click();

}

  ${[["No. Contrato",c.contrato],["Objeto",c.objeto],["Contratista",c.nombre],["Plazo ejecución inicial",c.plazoIni],["Plazo a prorrogar",c.plazoProrroga],["Plazo total",c.plazoTotal],["Valor inicial",fmtMoney(c.valorIni)],["Valor a adicionar",fmtMoney(c.valorAdic)],["Fecha de inicio",fmtDate(c.fechaIni)],["Fecha de terminación",fmtDate(c.fechaFin)],["Corte de ejecución",`${fmtDate(per.start)} al ${fmtDate(per.end)}`],["Fecha entrega del informe",fmtDate(entrega)]].map(([k,v])=>`<tr><td style="border:1px solid #ccc;padding:5px;background:#f3f0ff;width:32%"><b>${k}</b></td><td style="border:1px solid #ccc;padding:5px">${v}</td></tr>`).join("")}

/* ====================== MATRIZ DE SUPERVISIÓN ====================== */
function vMatriz(){
  const cs=DB.contractors;
  $("#view").innerHTML=`
    <div class="card mb"><div class="form-grid">
      <div class="f"><label>Contratista</label><select class="input" id="mC" onchange="renderMatriz()">${cs.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join("")}</select></div>
      <div class="f"><label>Período de corte</label><select class="input" id="mP" onchange="renderMatriz()"></select></div>
    </div></div>
    <div id="matrizBox"></div>`;
  fillPeriodos(); renderMatriz();
}
function fillPeriodos(){
  const c=DB.contractors.find(x=>x.id===$("#mC").value);
  const ps=periodosDisponibles(c.corte);
  $("#mP").innerHTML=ps.map((p,i)=>`<option value="${i}">${fmtDate(p.start)} al ${fmtDate(p.end)}</option>`).join("");
}
function renderMatriz(){
  const c=DB.contractors.find(x=>x.id===$("#mC").value);
  if($("#mP").dataset.c!==c.id){ fillPeriodos(); $("#mP").dataset.c=c.id; }
  const per=periodosDisponibles(c.corte)[+$("#mP").value||0];
  const an=aiAnalizar(c,per);
  $("#matrizBox").innerHTML=`
    <div class="ai-box mb"><div class="ai-tag"><span class="material-symbols-rounded">auto_awesome</span> Análisis automático del supervisor</div>
      <p class="tiny dim">Generado con las actividades registradas en el período ${fmtDate(per.start)} – ${fmtDate(per.end)}. Edita cualquier observación antes de guardar.</p></div>
    <div class="tbl-wrap"><table style="min-width:760px"><thead><tr>
      <th style="width:32%">Obligación contractual</th><th>Actividades</th><th style="width:12%">Concepto</th><th style="width:34%">Observación del supervisor (IA · editable)</th></tr></thead>
      <tbody>${an.porObl.map((p,i)=>`<tr>
        <td>${p.obl.texto}</td>
        <td>${p.acts.length?p.acts.map(a=>`<div class="tiny" style="margin-bottom:5px">• ${fmtDate(a.fecha)} — ${shorten(a.descAI,70)}</div>`).join(""):'<span class="muted tiny">Sin actividades</span>'}</td>
        <td>${p.sem==='r'?'<span class="badge bad">No cumple</span>':p.sem==='y'?'<span class="badge warn">Parcial</span>':'<span class="badge ok">Cumple</span>'}</td>
        <td><textarea class="input" style="min-height:88px;font-size:12.5px">${aiObservacionSupervisor(p)}</textarea></td>
      </tr>`).join("")}</tbody></table></div>
    <div class="row mt"><button class="btn btn-cta btn-sm" onclick="toast('Matriz guardada ✓')"><span class="material-symbols-rounded">save</span> Guardar matriz</button>
      <button class="btn btn-ghost btn-sm" onclick="descargarMatriz('${c.id}',${+$('#mP').value||0})"><span class="material-symbols-rounded">download</span> Descargar Word</button></div>`;
}
function descargarMatriz(id,pi){
  const c=DB.contractors.find(x=>x.id===id); const per=periodosDisponibles(c.corte)[pi]; const an=aiAnalizar(c,per);
  const html=`<html><head><meta charset="utf-8"></head><body style="font-family:Arial">
    <h2 style="color:#6C3BFF;text-align:center">MATRIZ DE SUPERVISIÓN</h2>
    <p style="text-align:center">${c.nombre} · ${c.contrato}<br>Período: ${fmtDate(per.start)} al ${fmtDate(per.end)}</p>
    <table width="100%" style="border-collapse:collapse;font-size:10pt">
    <tr style="background:#6C3BFF;color:#fff"><td style="border:1px solid #999;padding:6px">Obligación</td><td style="border:1px solid #999;padding:6px">Actividades</td><td style="border:1px solid #999;padding:6px">Concepto</td><td style="border:1px solid #999;padding:6px">Observación</td></tr>
    ${an.porObl.map(p=>`<tr><td style="border:1px solid #999;padding:6px">${p.obl.texto}</td><td style="border:1px solid #999;padding:6px">${p.acts.map(a=>fmtDate(a.fecha)+" — "+shorten(a.descAI,60)).join("<br>")||"Sin actividades"}</td><td style="border:1px solid #999;padding:6px">${p.sem==='g'?'Cumple':p.sem==='y'?'Parcial':'No cumple'}</td><td style="border:1px solid #999;padding:6px">${aiObservacionSupervisor(p)}</td></tr>`).join("")}
    </table></body></html>`;
  const blob=new Blob(['\ufeff'+html],{type:"application/msword"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`Matriz_${c.contrato}_${per.start}.doc`; a.click();
  toast("Matriz descargada ✓");
}

  const F=(k,l,t="text",v="")=>`<div class="f"><label>${l}</label><input class="input" id="m_${k}" type="${t}" value="${(c[k]??v)}"></div>`;
  openModal(`<span class="x material-symbols-rounded" onclick="closeModal()">close</span>
    <h3>${id?"Editar":"Nuevo"} contratista</h3><p class="muted tiny mb">Toda la información contractual editable desde aquí.</p>
    <div class="form-grid">
      ${F("nombre","Nombre completo")}${F("doc","Documento")}
      ${F("contrato","No. Contrato")}${F("dependencia","Dependencia")}
      <div class="f full"><label>Objeto del contrato</label><textarea class="input" id="m_objeto">${c.objeto||""}</textarea></div>
      ${F("supervisor","Supervisor")}
      <div class="f"><label>Estado</label><select class="input" id="m_estado">${["activo","suspendido","liquidado","terminado"].map(e=>`<option ${c.estado===e?"selected":""}>${e}</option>`).join("")}</select></div>
      ${F("plazoIni","Plazo ejecución inicial")}${F("plazoProrroga","Plazo a prorrogar")}
      ${F("plazoTotal","Plazo total")}
      ${F("valorIni","Valor inicial","number")}${F("valorAdic","Valor a adicionar","number")}
      ${F("fechaIni","Fecha de inicio","date")}${F("fechaFin","Fecha de terminación","date")}
      <div class="f"><label>Corte: día inicio</label><input class="input" id="m_ci" type="number" min="1" max="31" value="${c.corte.ini}"></div>
      <div class="f"><label>Corte: día fin</label><input class="input" id="m_cf" type="number" min="1" max="31" value="${c.corte.fin}"></div>
      ${F("fechaInforme","Fecha entrega informe","date")}
      ${F("eps","EPS")}${F("pension","Fondo de pensión")}${F("arl","ARL")}
      ${F("vSalud","Valor salud","number")}${F("vPension","Valor pensión","number")}${F("vArl","Valor ARL","number")}
      <div class="f full"><label>Observaciones</label><textarea class="input" id="m_obs" style="min-height:60px">${c.obs||""}</textarea></div>
    </div>
    <button class="btn btn-cta btn-block mt" onclick="guardarContratista('${id||""}')"><span class="material-symbols-rounded">save</span> Guardar</button>`);
}
function guardarContratista(id){
  const g=k=>$("#m_"+k)?.value;
  const data={ nombre:g("nombre"),doc:g("doc"),contrato:g("contrato"),dependencia:g("dependencia"),
    objeto:g("objeto"),supervisor:g("supervisor"),estado:g("estado"),plazoIni:g("plazoIni"),
    plazoProrroga:g("plazoProrroga"),plazoTotal:g("plazoTotal"),valorIni:+g("valorIni")||0,valorAdic:+g("valorAdic")||0,
    fechaIni:g("fechaIni"),fechaFin:g("fechaFin"),corte:{ini:+$("#m_ci").value,fin:+$("#m_cf").value},
    fechaInforme:g("fechaInforme"),eps:g("eps"),pension:g("pension"),arl:g("arl"),
    vSalud:+g("vSalud")||0,vPension:+g("vPension")||0,vArl:+g("vArl")||0,obs:g("obs") };
  data.vAportes=data.vSalud+data.vPension+data.vArl;
  if(!data.nombre||!data.contrato) return toast("Nombre y contrato son obligatorios","edit");
  if(id){ Object.assign(DB.contractors.find(c=>c.id===id),data); toast("Contrato actualizado ✓"); }
  else { DB.contractors.push({id:uid(),...data,obligaciones:mkObl(),novedades:[],email:""}); toast("Contratista creado ✓"); }
  if(LIVE()){ apiCall("guardar_contratista",{id,data}).catch(()=>{}); }
  closeModal(); go(CURRENT);
}
function eliminarContratista(id){
  const c=DB.contractors.find(x=>x.id===id);
  openModal(`<h3>Eliminar contratista</h3><p class="dim mt-s">¿Seguro que deseas eliminar a <b>${c.nombre}</b>? Esta acción no se puede deshacer.</p>
    <div class="row mt"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-cta btn-sm" onclick="DB.contractors=DB.contractors.filter(x=>x.id!=='${id}');closeModal();go(CURRENT);toast('Contratista eliminado')">Sí, eliminar</button></div>`);
}

/* ----- Obligaciones: crear, editar, eliminar, reordenar (drag), activar ----- */
let DRAG=null;
function modalObligaciones(id){
  const c=DB.contractors.find(x=>x.id===id);
  openModal(`<span class="x material-symbols-rounded" onclick="closeModal()">close</span>
    <h3>Obligaciones · ${c.nombre}</h3><p class="muted tiny mb">Arrastra para reordenar. Activa o desactiva con el interruptor.</p>
    <div id="oblList">${oblListHTML(c)}</div>
    <div class="row mt"><input class="input" id="newObl" placeholder="Nueva obligación contractual…" style="flex:1">
    <button class="btn btn-purple btn-sm" onclick="addObl('${id}')"><span class="material-symbols-rounded">add</span></button></div>`);
  bindDrag(c);
}
function oblListHTML(c){
  return c.obligaciones.sort((a,b)=>a.orden-b.orden).map(o=>`
    <div class="obl" draggable="true" data-oid="${o.id}">
      <span class="handle material-symbols-rounded">drag_indicator</span>
      <div class="body"><b style="${o.activa?'':'opacity:.45;text-decoration:line-through'}">${o.texto}</b></div>
      <div class="row">
        <button class="btn btn-ghost btn-sm" onclick="toggleObl('${c.id}','${o.id}')"><span class="material-symbols-rounded">${o.activa?'toggle_on':'toggle_off'}</span></button>
        <button class="btn btn-ghost btn-sm" onclick="editObl('${c.id}','${o.id}')"><span class="material-symbols-rounded">edit</span></button>
        <button class="btn btn-ghost btn-sm" onclick="delObl('${c.id}','${o.id}')"><span class="material-symbols-rounded">delete</span></button>
      </div></div>`).join("");
}
function bindDrag(c){
  $$("#oblList .obl").forEach(el=>{
    el.ondragstart=()=>{DRAG=el.dataset.oid;el.classList.add("drag");};
    el.ondragend=()=>{el.classList.remove("drag");};
    el.ondragover=e=>e.preventDefault();
    el.ondrop=e=>{ e.preventDefault(); const target=el.dataset.oid;
      const arr=c.obligaciones.sort((a,b)=>a.orden-b.orden);
      const from=arr.findIndex(o=>o.id===DRAG), to=arr.findIndex(o=>o.id===target);
      const [m]=arr.splice(from,1); arr.splice(to,0,m); arr.forEach((o,i)=>o.orden=i+1);
      $("#oblList").innerHTML=oblListHTML(c); bindDrag(c); toast("Orden actualizado");
    };
  });
}
function addObl(id){ const c=DB.contractors.find(x=>x.id===id); const t=$("#newObl").value.trim(); if(!t)return;
  c.obligaciones.push({id:uid(),orden:c.obligaciones.length+1,texto:t,activa:true});
  $("#oblList").innerHTML=oblListHTML(c); bindDrag(c); $("#newObl").value=""; toast("Obligación creada"); }
function toggleObl(cid,oid){ const c=DB.contractors.find(x=>x.id===cid); const o=c.obligaciones.find(x=>x.id===oid); o.activa=!o.activa; $("#oblList").innerHTML=oblListHTML(c); bindDrag(c); }
function delObl(cid,oid){ const c=DB.contractors.find(x=>x.id===cid); c.obligaciones=c.obligaciones.filter(o=>o.id!==oid); $("#oblList").innerHTML=oblListHTML(c); bindDrag(c); toast("Obligación eliminada"); }
function editObl(cid,oid){ const c=DB.contractors.find(x=>x.id===cid); const o=c.obligaciones.find(x=>x.id===oid);
  const t=prompt("Editar obligación:",o.texto); if(t){o.texto=t;$("#oblList").innerHTML=oblListHTML(c);bindDrag(c);} }

/* ----- Novedades: adiciones, prórrogas, suspensiones, reinicios, liquidaciones ----- */
function modalNovedad(id){
  const c=DB.contractors.find(x=>x.id===id);
  openModal(`<span class="x material-symbols-rounded" onclick="closeModal()">close</span>
    <h3>Novedades contractuales · ${c.nombre}</h3>
    <div class="form-grid mt-s">
      <div class="f"><label>Tipo de novedad</label><select class="input" id="nTipo">${["Adición","Prórroga","Suspensión","Reinicio","Liquidación"].map(t=>`<option>${t}</option>`).join("")}</select></div>
      <div class="f"><label>Fecha</label><input class="input" type="date" id="nFecha" value="${todayISO()}"></div>
      <div class="f full"><label>Detalle</label><textarea class="input" id="nDetalle" placeholder="Ej: Adición por $2.000.000 / prórroga de 2 meses…"></textarea></div>
    </div>
    <button class="btn btn-cta btn-block mt" onclick="addNovedad('${id}')"><span class="material-symbols-rounded">add</span> Registrar novedad</button>
    <h4 style="margin:18px 0 8px">Historial</h4>
    <div id="novList">${novListHTML(c)}</div>`);
}
const novListHTML=c=> c.novedades.length? c.novedades.map(n=>`<div class="alert"><span class="dot ok"></span><div><b>${n.tipo}</b> · ${fmtDate(n.fecha)}<br><span class="muted tiny">${n.detalle}</span></div></div>`).join(""):'<p class="muted tiny">Sin novedades registradas.</p>';
function addNovedad(id){ const c=DB.contractors.find(x=>x.id===id);
  c.novedades.push({tipo:$("#nTipo").value,fecha:$("#nFecha").value,detalle:$("#nDetalle").value});
  if($("#nTipo").value==="Suspensión")c.estado="suspendido"; if($("#nTipo").value==="Reinicio")c.estado="activo"; if($("#nTipo").value==="Liquidación")c.estado="liquidado";
  $("#novList").innerHTML=novListHTML(c); toast("Novedad registrada ✓"); }
